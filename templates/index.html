<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Smart Resume Screening System
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

    <section class="hero">

        <h1>
            Smart Resume Screening System
        </h1>

        <p>
            AI-Powered Resume Ranking, Skill Gap Analysis,
            and ATS Evaluation Platform
        </p>

    </section>

    <section class="upload-section">

        <div class="card">

            <form
                action="/upload"
                method="POST"
                enctype="multipart/form-data"
            >

                <h2>
                    Job Description
                </h2>

                <textarea
                    name="job_description"
                    placeholder="Paste the Job Description here..."
                    required
                ></textarea>

                <h2 class="upload-title">
                    Upload Resume
                </h2>

                <input
                    type="file"
                    name="resume"
                    accept=".pdf"
                    required
                >

                <button
                    type="submit"
                    class="analyze-btn"
                >
                    Analyze Resume
                </button>

            </form>

        </div>

    </section>

</body>

</html>
